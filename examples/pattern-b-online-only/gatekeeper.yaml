version: "1.0"
model_type: llm
eval_dataset:
  uri: ./examples/pattern-b-online-only/data/eval.jsonl
  format: jsonl
  label_column: label
  task_type: classification
gates:
  - name: latency_gate
    phase: online
    evaluator: latency
    metric: p95_latency_ms
    threshold: 500
    comparator: "<"
    blocking: true
    num_warmup_requests: 3
    num_benchmark_requests: 20
    description: "P95 latency must be under 500ms"
canary:
  traffic_percent: 10
  observation_window_minutes: 5
  auto_promote_threshold:
    latency_p95_ms: 500
    error_rate: 0.05
  auto_rollback_threshold:
    latency_p95_ms: 2000
    error_rate: 0.20
